version: '3.8'

services:
  r-analytics:
    build: .
    container_name: ncskit-r-analytics
    ports:
      - "8000:8000"
    volumes:
      - ./api.R:/app/api.R
      - ./modules:/app/modules
    restart: unless-stopped
    environment:
      - R_LOG_LEVEL=INFO
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
